---
# ============================================================
# ROLE : cisco_3750
# Configure le Catalyst 3750 : VLANs, Trunks, STP, SNMP, NTP
# ============================================================

- name: "[CISCO] Désactiver CDP sur ports edge (sécurité)"
  cisco.ios.ios_config:
    lines:
      - no cdp enable
    parents: "interface {{ item.name }}"
  loop: "{{ access_interfaces }}"
  tags: security

- name: "[CISCO] Créer les VLANs"
  cisco.ios.ios_vlans:
    config:
      - vlan_id: "{{ item.id }}"
        name: "{{ item.name }}"
        state: active
    state: merged
  loop: "{{ vlans }}"
  tags: vlans
  notify: save cisco config

- name: "[CISCO] Configurer les ports TRUNK"
  cisco.ios.ios_l2_interfaces:
    config:
      - name: "{{ item.name }}"
        mode: trunk
        trunk:
          allowed_vlans: "{{ item.allowed_vlans }}"
          native_vlan: "{{ item.native_vlan | default(10) }}"
    state: merged
  loop: "{{ trunk_interfaces }}"
  tags: trunks
  notify: save cisco config

- name: "[CISCO] Activer les ports TRUNK (no shutdown)"
  cisco.ios.ios_interfaces:
    config:
      - name: "{{ item.name }}"
        description: "{{ item.description }}"
        enabled: true
    state: merged
  loop: "{{ trunk_interfaces }}"
  tags: trunks

- name: "[CISCO] Configurer EtherChannel LACP (Port-Channel)"
  cisco.ios.ios_config:
    lines:
      - "interface Port-channel{{ item.id }}"
      - " description {{ item.description }}"
      - " switchport mode trunk"
      - " switchport trunk allowed vlan {{ item.allowed_vlans }}"
      - " switchport trunk native vlan {{ item.native_vlan }}"
      - " spanning-tree portfast trunk"
  loop: "{{ port_channels }}"
  tags: lacp
  notify: save cisco config

- name: "[CISCO] Assigner les interfaces membres au Port-Channel LACP"
  cisco.ios.ios_config:
    lines:
      - "channel-group {{ item.port_channel }} mode active"
      - "channel-protocol lacp"
    parents: "interface {{ item.name }}"
  loop: "{{ trunk_interfaces | selectattr('port_channel', 'defined') | list }}"
  tags: lacp
  notify: save cisco config

- name: "[CISCO] Configurer les ports ACCESS"
  cisco.ios.ios_l2_interfaces:
    config:
      - name: "{{ item.name }}"
        mode: access
        access:
          vlan: "{{ item.vlan }}"
    state: merged
  loop: "{{ access_interfaces }}"
  tags: access
  notify: save cisco config

- name: "[CISCO] Activer et décrire les ports ACCESS"
  cisco.ios.ios_interfaces:
    config:
      - name: "{{ item.name }}"
        description: "{{ item.description }}"
        enabled: true
    state: merged
  loop: "{{ access_interfaces }}"
  tags: access

- name: "[CISCO] Port-security sur ports ACCESS"
  cisco.ios.ios_config:
    lines:
      - switchport port-security
      - switchport port-security maximum 2
      - switchport port-security violation restrict
      - switchport port-security aging time 30
      - spanning-tree portfast
      - spanning-tree bpduguard enable
      - ip dhcp snooping limit rate 15
    parents: "interface {{ item.name }}"
  loop: "{{ access_interfaces }}"
  tags: security
  notify: save cisco config

- name: "[CISCO] Configurer l'interface SVI de management"
  cisco.ios.ios_l3_interfaces:
    config:
      - name: "Vlan{{ mgmt_vlan_interface.vlan }}"
        ipv4:
          - address: "{{ mgmt_vlan_interface.ip }}/24"
    state: merged
  tags: mgmt
  notify: save cisco config

- name: "[CISCO] Activer l'interface SVI management"
  cisco.ios.ios_interfaces:
    config:
      - name: "Vlan{{ mgmt_vlan_interface.vlan }}"
        enabled: true
    state: merged
  tags: mgmt

- name: "[CISCO] Route par défaut"
  cisco.ios.ios_static_routes:
    config:
      - address_families:
          - afi: ipv4
            routes:
              - dest: "0.0.0.0/0"
                next_hops:
                  - forward_router_address: "{{ mgmt_vlan_interface.gateway }}"
    state: merged
  tags: routing
  notify: save cisco config

- name: "[CISCO] STP — Définir Root Bridge primaire"
  cisco.ios.ios_config:
    lines:
      - "spanning-tree vlan {{ stp_root_primary_vlans }} priority 4096"
      - "spanning-tree mode rapid-pvst"
  tags: stp
  notify: save cisco config

- name: "[CISCO] DHCP Snooping global"
  cisco.ios.ios_config:
    lines:
      - ip dhcp snooping
      - ip dhcp snooping vlan 10,20,30,40
      - no ip dhcp snooping information option
  tags: security
  notify: save cisco config

- name: "[CISCO] DHCP Snooping trust sur uplinks"
  cisco.ios.ios_config:
    lines:
      - ip dhcp snooping trust
    parents: "interface {{ item.name }}"
  loop: "{{ trunk_interfaces }}"
  tags: security
  notify: save cisco config

- name: "[CISCO] Dynamic ARP Inspection"
  cisco.ios.ios_config:
    lines:
      - ip arp inspection vlan 10,20,30,40
  tags: security
  notify: save cisco config

- name: "[CISCO] Configurer SNMP v2c"
  cisco.ios.ios_config:
    lines:
      - "snmp-server community {{ snmp_community_ro }} RO"
      - "snmp-server community {{ snmp_community_rw }} RW"
      - "snmp-server location {{ snmp_location }}"
      - "snmp-server contact {{ snmp_contact }}"
      - "snmp-server enable traps"
  tags: snmp
  notify: save cisco config

- name: "[CISCO] Configurer NTP"
  cisco.ios.ios_ntp_global:
    config:
      servers:
        - server: "{{ ntp_server_primary }}"
          prefer: true
        - server: "{{ ntp_server_secondary }}"
    state: replaced
  tags: ntp
  notify: save cisco config

- name: "[CISCO] Configurer Syslog"
  cisco.ios.ios_logging_global:
    config:
      hosts:
        - hostname: "{{ syslog_server }}"
          severity: informational
    state: merged
  tags: logging
  notify: save cisco config

- name: "[CISCO] Hardening — Désactiver services inutiles"
  cisco.ios.ios_config:
    lines:
      - no service tcp-small-servers
      - no service udp-small-servers
      - no ip http server
      - no ip http secure-server
      - no ip finger
      - no ip bootp server
      - no cdp run
      - service password-encryption
      - no ip source-route
      - ip tcp intercept list 100
  tags: hardening
  notify: save cisco config

- name: "[CISCO] Banner MOTD sécurité"
  cisco.ios.ios_banner:
    banner: motd
    text: |
      ******************************************************************
      * Acces restreint - Atlas Consulting                             *
      * Toute connexion non autorisee est interdite et tracee          *
      ******************************************************************
    state: present
  tags: hardening
