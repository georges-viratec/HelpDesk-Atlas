---
# ============================================================
# ROLE : procurve_2510
# HP ProCurve 2510-24 — Configuration via CLI (SSH)
# Note : pas de module Ansible natif pour ce switch ancien.
# On utilise cli_command / cli_config de ansible.netcommon
# ============================================================

# Le ProCurve utilise un mode "manager" (équivalent enable)
# La connexion SSH arrive directement en mode manager si le mdp est correct.

- name: "[PROCURVE] Créer les VLANs"
  ansible.netcommon.cli_config:
    config: |
      vlan {{ item.id }}
        name {{ item.name }}
        exit
  loop: "{{ vlans }}"
  tags: vlans
  notify: save procurve config

- name: "[PROCURVE] Configurer l'IP de management (VLAN 10)"
  ansible.netcommon.cli_config:
    config: |
      vlan {{ mgmt_vlan }}
        ip address {{ mgmt_ip }} {{ mgmt_mask }}
        exit
      ip default-gateway {{ mgmt_gateway }}
  tags: mgmt
  notify: save procurve config

- name: "[PROCURVE] Configurer les ports TRUNK (tagged)"
  ansible.netcommon.cli_config:
    config: |
      vlan {{ item.split(',') | join('\n      vlan ') }}
  # ProCurve syntax: on tague port par port dans chaque VLAN
  # On utilise une approche VLAN-par-VLAN ci-dessous
  when: false  # désactivé — voir tâche suivante plus explicite
  tags: trunks

- name: "[PROCURVE] Tagguer les ports uplink dans chaque VLAN"
  ansible.netcommon.cli_config:
    config: |
      vlan {{ item.0.id }}
        tagged {{ item.1.name }}
        exit
  with_nested:
    - "{{ vlans }}"
    - "{{ trunk_ports }}"
  tags: trunks
  notify: save procurve config

- name: "[PROCURVE] Configurer les ports ACCESS (untagged)"
  ansible.netcommon.cli_config:
    config: |
      vlan {{ item.untagged_vlan }}
        untagged {{ item.name }}
        exit
  loop: "{{ access_ports }}"
  tags: access
  notify: save procurve config

- name: "[PROCURVE] Retirer les ports ACCESS du VLAN 1 par défaut"
  ansible.netcommon.cli_config:
    config: |
      vlan 1
        no untagged {{ item.name }}
        exit
  loop: "{{ access_ports }}"
  tags: access
  notify: save procurve config

- name: "[PROCURVE] Port-security sur ports utilisateurs"
  ansible.netcommon.cli_config:
    config: |
      port-security {{ item.name }} learn-mode static action send-alarm
  loop: "{{ access_ports }}"
  tags: security
  notify: save procurve config

- name: "[PROCURVE] Configurer STP (RSTP) et priorité"
  ansible.netcommon.cli_config:
    config: |
      spanning-tree
      spanning-tree mode rapid-pvst
      spanning-tree priority {{ stp_priority }}
  tags: stp
  notify: save procurve config

- name: "[PROCURVE] SNMP v2c"
  ansible.netcommon.cli_config:
    config: |
      snmp-server community "{{ snmp_community_ro }}" operator restricted
      snmp-server community "{{ snmp_community_rw }}" manager unrestricted
      snmp-server location "{{ snmp_location }}"
      snmp-server contact "{{ snmp_contact }}"
  tags: snmp
  notify: save procurve config

- name: "[PROCURVE] NTP"
  ansible.netcommon.cli_config:
    config: |
      timesync ntp
      ntp unicast
      ntp server {{ ntp_server_primary }} iburst
      ntp server {{ ntp_server_secondary }}
  tags: ntp
  notify: save procurve config

- name: "[PROCURVE] Syslog"
  ansible.netcommon.cli_config:
    config: |
      logging {{ syslog_server }}
      logging severity informational
  tags: logging
  notify: save procurve config

- name: "[PROCURVE] Hardening — SSH only, désactiver Telnet/Web"
  ansible.netcommon.cli_config:
    config: |
      no telnet-server
      no web-management
      ip ssh
      ip ssh version 2
      aaa authentication ssh login public-key none
      password-min-length 12
  tags: hardening
  notify: save procurve config

- name: "[PROCURVE] Banner de connexion"
  ansible.netcommon.cli_config:
    config: |
      banner motd "Acces restreint - Atlas Consulting. Connexion non autorisee interdite."
  tags: hardening
  notify: save procurve config
