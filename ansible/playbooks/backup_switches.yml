---
# ============================================================
# PLAYBOOK — Backup des configurations switches
# Lance depuis le Bastion (10.10.10.100)
# Sauvegarde dans /opt/backups/switches/
# ============================================================

- name: "Backup config Cisco 3750"
  hosts: cisco
  gather_facts: false
  vars_files:
    - "../group_vars/vault.yml"
  tasks:
    - name: "Récupérer la running-config"
      cisco.ios.ios_command:
        commands: show running-config
      register: running_config

    - name: "Sauvegarder en local sur le bastion"
      copy:
        content: "{{ running_config.stdout[0] }}"
        dest: "/opt/backups/switches/{{ inventory_hostname }}_{{ ansible_date_time.date }}.cfg"
      delegate_to: localhost

- name: "Backup config ProCurve"
  hosts: procurve
  gather_facts: false
  vars_files:
    - "../group_vars/vault.yml"
  tasks:
    - name: "Récupérer la running-config"
      ansible.netcommon.cli_command:
        command: show running-config
      register: running_config

    - name: "Sauvegarder en local sur le bastion"
      copy:
        content: "{{ running_config.stdout }}"
        dest: "/opt/backups/switches/{{ inventory_hostname }}_{{ ansible_date_time.date }}.cfg"
      delegate_to: localhost
