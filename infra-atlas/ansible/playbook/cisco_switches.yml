---
- name: Configuration des switchs Cisco Catalyst 2960
  hosts: cisco_switches
  gather_facts: false

  tasks:

    - name: Créer les VLANs
      cisco.ios.ios_vlans:
        config:
          - vlan_id: "{{ item.id }}"
            name: "{{ item.name }}"
        state: merged
      loop: "{{ vlans }}"

    - name: Configurer les ports trunk vers Proxmox
      cisco.ios.ios_l2_interfaces:
        config:
          - name: "{{ item }}"
            mode: trunk
            trunk:
              allowed_vlans: "10,20,30,40,50,60,99"
        state: merged
      loop: "{{ trunk_ports }}"

    - name: Configurer le port WAN (access VLAN 99)
      cisco.ios.ios_l2_interfaces:
        config:
          - name: "{{ wan_port }}"
            mode: access
            access:
              vlan: 99
        state: merged

    - name: Activer RSTP
      cisco.ios.ios_config:
        lines:
          - spanning-tree mode rapid-pvst

    - name: Désactiver les ports inutilisés
      cisco.ios.ios_config:
        parents: "interface range GigabitEthernet1/0/13-48"
        lines:
          - shutdown
          - description PORT_INUTILISE

    - name: Sauvegarder la config
      cisco.ios.ios_config:
        save_when: always
