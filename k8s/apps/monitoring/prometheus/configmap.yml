---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'kubernetes-nodes'
        static_configs:
          - targets:
            - 10.10.30.10:9100
            - 10.10.30.11:9100
            - 10.10.30.12:9100
            - 10.10.30.13:9100

      - job_name: 'galera'
        static_configs:
          - targets:
            - 10.10.40.11:9104
            - 10.10.40.12:9104
            - 10.10.40.13:9104

      - job_name: 'proxmox'
        static_configs:
          - targets:
            - 10.10.10.11:9221
            - 10.10.10.12:9221
